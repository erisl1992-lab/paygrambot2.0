<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paygram - Calculadora Oficial</title>
    <!-- SDK Oficial de Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #181818);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #007cb0);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #242424);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        /* Barra superior para el Saludo y el Icono de Telegram */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            margin-bottom: 20px;
        }

        .saludo-texto {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .telegram-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .telegram-icon {
            width: 18px;
            height: 18px;
            fill: #24A1DE;
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            margin-bottom: 16px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--button-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--hint-color);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .resultado-box {
            background-color: rgba(0, 124, 176, 0.15);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-top: 10px;
            border-left: 4px solid var(--button-color);
        }

        .resultado-box strong {
            color: var(--button-color);
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background-color: #0070ba;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .btn-enviar:active {
            background-color: #005ea6;
        }

        .paypal-icon {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        .oculto {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- BARRA SUPERIOR DINÁMICA -->
    <div class="top-bar">
        <div class="saludo-texto" id="saludo-usuario">¡Hola!</div>
        <div class="telegram-badge">
            <!-- Icono Oficial de Telegram SVG -->
            <svg class="telegram-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.62.15-.15 2.7-2.48 2.75-2.7.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.16 3.42-.49.34-.93.5-1.33.49-.44-.01-1.29-.25-1.92-.45-.77-.25-1.39-.39-1.34-.83.03-.23.35-.46.97-.71 3.8-1.65 6.34-2.74 7.61-3.26 3.61-1.48 4.36-1.74 4.85-1.75.11 0 .35.03.51.16.13.11.17.26.19.37z"/>
            </svg>
            <span id="telegram-handle" style="font-size: 0.9rem; font-weight: 600;">@usuario</span>
        </div>
    </div>

    <!-- CALCULADORA DE CAMBIO -->
    <div class="card">
        <h2>Calculadora de Cambio</h2>
        <div class="tasa-info" style="font-size: 0.95rem; margin-bottom: 15px; color: var(--hint-color);">Tasa de cambio: <strong style="color: #007cb0;">45.00 Bs / $</strong></div>

        <div class="input-group">
            <label for="paypal-enviar">Monto bruto que enviarás en PayPal ($):</label>
            <input type="number" id="paypal-enviar" placeholder="Ej: 10" min="1" step="0.01">
        </div>

        <div class="resultado-box">
            Comisión PayPal (5.4% + 0.30): <span id="comision-fee">$0.00</span><br>
            <strong>Monto neto que recibimos: <span id="monto-neto">$0.00</span></strong>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Vas a recibir en Bolívares:</label>
            <input type="text" id="bs-recibir" readonly style="font-weight: bold; background-color: rgba(255,255,255,0.05); color: var(--text-color); border: none;">
        </div>
    </div>

    <!-- DATOS DE DESTINO -->
    <div class="card">
        <h2>Datos de Recepción en Venezuela</h2>
        
        <div class="input-group">
            <label for="tipo-pago">Método de Recepción:</label>
            <select id="tipo-pago">
                <option value="pago-movil">📱 Pago Móvil</option>
                <option value="transferencia">🏦 Transferencia Bancaria</option>
            </select>
        </div>

        <div class="input-group">
            <label for="banco">Banco Destino:</label>
            <select id="banco">
                <option value="0102">Banco de Venezuela (BDV)</option>
                <option value="0134">Banesco</option>
                <option value="0105">Mercantil Banco</option>
                <option value="0108">Provincial (BBVA)</option>
                <option value="0163">Banco del Tesoro</option>
            </select>
        </div>

        <div class="input-group" id="grupo-telefono">
            <label for="telefono-pago">Teléfono del Pago Móvil:</label>
            <input type="tel" id="telefono-pago" placeholder="Ej: 04241234567">
        </div>

        <div class="input-group oculto" id="grupo-cuenta">
            <label for="cuenta-restante">Cuenta Bancaria (16 dígitos restantes):</label>
            <div style="display: flex; gap: 5px;">
                <div id="prefijo-banco" style="padding: 12px; background: rgba(255,255,255,0.07); border: 1px solid #444; border-radius: 8px; font-weight: bold;">0102</div>
                <input type="text" id="cuenta-restante" placeholder="Dígitos restantes" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
        </div>
    </div>

    <!-- BOTÓN OFICIAL DE PAGO CON LOGO DE PAYPAL -->
    <button class="btn-enviar" id="btn-procesar">
        <svg class="paypal-icon" viewBox="0 0 24 24">
            <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944 3.354a1.3 1.3 0 0 1 1.284-1.09h6.375c3.045 0 5.486.72 6.85 2.11 1.258 1.28 1.637 3.14 1.155 5.372-.676 3.127-2.693 5.47-5.617 6.488-1.398.487-3.132.703-5.22.703H8.344l-1.042 4.41a.243.243 0 0 1-.226.2z"/>
        </svg>
        Pagar con PayPal
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const TASA_CAMBIO = 45.00;

        // --- SALUDO DINÁMICO Y DETECCIÓN DE USUARIO ---
        function inicializarSaludo() {
            const ahora = new Date();
            const hora = ahora.getHours();
            let saludo = "¡Hola!";

            if (hora >= 6 && hora < 12) {
                saludo = "¡Buenos días!";
            } else if (hora >= 12 && hora < 19) {
                saludo = "¡Buenas tardes!";
            } else {
                saludo = "¡Buenas noches!";
            }

            document.getElementById('saludo-usuario').innerText = saludo;

            // Leer datos del cliente desde Telegram WebApp SDK
            const user = tg.initDataUnsafe?.user;
            const badgeHandle = document.getElementById('telegram-handle');

            if (user) {
                if (user.username) {
                    badgeHandle.innerText = `@${user.username}`;
                } else {
                    badgeHandle.innerText = `ID: ${user.id}`;
                }
            } else {
                badgeHandle.innerText = "Modo de Prueba";
            }
        }
        inicializarSaludo();

        // --- MATEMÁTICA DE LA CALCULADORA ---
        const inputPaypal = document.getElementById('paypal-enviar');
        const inputBs = document.getElementById('bs-recibir');

        inputPaypal.addEventListener('input', () => {
            const montoBruto = parseFloat(inputPaypal.value);
            if (isNaN(montoBruto) || montoBruto <= 0) {
                document.getElementById('comision-fee').innerText = "$0.00";
                document.getElementById('monto-neto').innerText = "$0.00";
                inputBs.value = "0.00 Bs.";
                return;
            }
            const comision = (montoBruto * 0.054) + 0.30;
            const montoNeto = montoBruto - comision;
            const bolivares = montoNeto * TASA_CAMBIO;

            document.getElementById('comision-fee').innerText = `$${comision.toFixed(2)}`;
            document.getElementById('monto-neto').innerText = `$${montoNeto.toFixed(2)}`;
            inputBs.value = `${bolivares.toLocaleString("es-VE", {minimumFractionDigits: 2})} Bs.`;
        });

        // Alternar vistas de Pago Móvil y Transferencia Bancaria
        document.getElementById('tipo-pago').addEventListener('change', (e) => {
            if (e.target.value === 'pago-movil') {
                document.getElementById('grupo-telefono').classList.remove('oculto');
                document.getElementById('grupo-cuenta').classList.add('oculto');
            } else {
                document.getElementById('grupo-telefono').classList.add('oculto');
                document.getElementById('grupo-cuenta').classList.remove('oculto');
            }
        });

        document.getElementById('banco').addEventListener('change', (e) => {
            document.getElementById('prefijo-banco').innerText = e.target.value;
        });

        // Acción al presionar Pagar
        document.getElementById('btn-procesar').addEventListener('click', () => {
            if(!inputPaypal.value || inputPaypal.value <= 0) {
                tg.showAlert("Por favor, introduce un monto válido en dólares.");
                return;
            }
            tg.showAlert("¡Validación exitosa! Conectando con las pasarelas de pago de Paygram...");
        });
    </script>
</body>
</html>
